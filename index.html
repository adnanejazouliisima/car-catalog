<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Catalogue Véhicules - Location Longue Durée</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <h1>Catalogue Véhicules</h1>
        <p class="subtitle">Location longue durée — Swipez pour parcourir</p>
    </header>

    <div class="swiper">
        <div class="swiper-wrapper" id="catalog">
            <!-- Cards injected by JS -->
        </div>
        <div class="swiper-pagination"></div>
    </div>

    <div class="counter" id="counter">1 / 0</div>

    <script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
    <script src="cars.js"></script>
    <script src="script.js"></script>
</body>
</html>
